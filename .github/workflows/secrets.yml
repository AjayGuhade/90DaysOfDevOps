name: Secrets Demo

on: push

jobs:
  check-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "Secret is missing"
          fi

      - name: Try printing secret (masked)
        run: echo "${{ secrets.MY_SECRET_MESSAGE }}"
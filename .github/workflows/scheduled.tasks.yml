name: Scheduled Tasks

on:
  schedule:
    - cron: '30 2 * * 1'     # Monday 2:30 AM UTC
    - cron: '0 */6 * * *'    # Every 6 hours
  workflow_dispatch:

jobs:
  schedule-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print trigger
        run: echo "Triggered by: ${{ github.event.schedule }}"

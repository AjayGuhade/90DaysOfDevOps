name: Deploy After Tests

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - run: echo "Deploying because tests passed ✅"

      - name: Fail message
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: echo "Tests failed ❌"
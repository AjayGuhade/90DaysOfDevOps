name: Job Outputs Example

on: push

jobs:

  generate-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.date.outputs.today }}

    steps:
      - name: Get Date
        id: date
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  print-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
      - name: Print date
        run: echo "Today's date is ${{ needs.generate-date.outputs.today }}"